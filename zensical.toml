[project]
site_name = "torchfits"
site_description = "High-performance FITS I/O to PyTorch tensors and dataframes (FITS tables as columnar catalogs)."
site_url = "https://astroai.github.io/torchfits/"
repo_url = "https://github.com/astroai/torchfits"
repo_name = "astroai/torchfits"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2026 torchfits contributors"

extra_css = [
  "stylesheets/extra.css",
  "https://unpkg.com/katex@0/dist/katex.min.css",
]

extra_javascript = [
  "javascripts/katex.js",
  "https://unpkg.com/katex@0/dist/katex.min.js",
  "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js",
]

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    "install.md",
    "quickstart.md",
    "cli.md",
    "cli-recipes.md",
  ]},
  {"Reference" = [
    "api.md",
    "api-core-io.md",
    "api-tables.md",
    "api-data.md",
    "api-transforms.md",
    "architecture.md",
  ]},
  {"Guides" = [
    "examples.md",
    "examples-transforms.md",
    "benchmarks.md",
    "parity.md",
  ]},
  {"Migration" = [
    "migration_astropy.md",
    "migration_fitsio.md",
    "migration_datasets.md",
  ]},
  {"Project" = [
    "changelog.md",
    "roadmap.md",
    "contributing.md",
    "release.md",
  ]},
]

[project.theme]
name = "material"
custom_dir = "overrides"
logo = "torchfits-logo.png"
favicon = "torchfits-logo.png"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.path",
  "navigation.top",
  "navigation.indexes",
  "navigation.instant",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.tabs.link",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ── Markdown extensions ──────────────────────────────────────

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "pymdownx.emoji.twemoji"
emoji_generator = "pymdownx.emoji.to_svg"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.def_list]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
