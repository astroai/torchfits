[workspace]
preview = ["pixi-build"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]




[package]
name = "torchfits"
version = "1.0.0rc4"
description = "FITS I/O for PyTorch with native tensor reads, datasets, and transforms"
authors = ["Seb Fabbro <sebfabbro@gmail.com>"]

[package.build]
backend = { name = "pixi-build-cmake", version = "*"}

# Build dependencies - tools needed to build the package
# Note: cmake, ninja, and cxx-compiler are automatically provided by pixi-build-cmake
[package.build-dependencies]
nanobind = ">=2.10.2"
scikit-build-core = ">=0.11.6"
cmake = ">=3.21"
ninja = ">=1.10"
python = ">=3.10"
pytorch = ">=2.10,<2.11"
cfitsio = ">=4.6.3,<4.6.5"

# Host dependencies - libraries that will be linked into the package
[package.host-dependencies]
python = ">=3.10"
pytorch = ">=2.10,<2.11"
cfitsio = ">=4.6.3,<4.6.5"
nanobind = ">=2.10.2"

# Run dependencies - packages needed at runtime
[package.run-dependencies]
pytorch = ">=2.10,<2.11"
numpy = ">=1.20"
pyarrow = ">=5.0"
cfitsio = ">=4.6.3,<4.6.5"

# Workspace dependencies - development environment
[dependencies]
# torchfits = { path = "." }  # Don't add self-dependency - causes circular dependency
pytest = ">=8.0"
pytest-cov = ">=5.0"
ruff = ">=0.15.5,<0.16"
mypy = ">=1.9"
pip = ">=24.0"
astropy = ">=5.0"
fitsio = ">=1.2"
matplotlib = ">=3.8"
pandas = ">=2.2"
scikit-build-core = ">=0.11.6"
cmake = ">=3.21"
ninja = ">=1.10"
nanobind = ">=2.10.2"
pytorch = ">=2.10,<2.11"
numpy = ">=1.20"
pre-commit = ">=3.5.0"
pyarrow = ">=24.0.0,<25"
polars = ">=1.42.1,<2"
duckdb = ">=1.5.4,<2"

[tasks]
# Development tasks
dev = "pip install -e . --no-build-isolation"
build = "pixi build"
test = "pixi run dev && KMP_DUPLICATE_LIB_OK=TRUE pytest tests/"
release-gate = "pixi run dev && KMP_DUPLICATE_LIB_OK=TRUE pytest tests/test_fitsio_upstream_smoke.py tests/test_astropy_upstream_smoke.py tests/test_package_isolation.py tests/test_docs_integrity.py tests/test_fits_schema.py tests/test_read_policy.py tests/test_examples_runner.py tests/test_scale_on_device.py tests/test_data.py tests/test_transforms.py tests/test_transforms_e2e.py tests/test_api.py tests/test_arrow_table_api.py tests/test_security.py tests/test_release_smoke.py tests/test_cli.py tests/test_public_boundary.py tests/test_http_probe_fixture.py -q && pixi run docs-contract && pixi run docs-links"
lint = "ruff check . && ruff format ."
preflight-push = "ruff check . && ruff format --check . && mypy src/torchfits && python -m compileall -q src/torchfits tests"
ci-local = "bash scripts/ci_local.sh"
ci-local-fast = "CI_LOCAL_FAST=1 bash scripts/ci_local.sh"
setup-hooks = "pre-commit install"
pre-commit = "pre-commit run --all-files"
docs-build = "bash scripts/sync_docs_examples.sh && zensical build --clean"
docs-build-pages = "bash scripts/build_docs_pages.sh --root-from-head"
docs-serve = "zensical serve"
docs-contract = "bash scripts/sync_docs_examples.sh && zensical build --clean && pytest tests/test_docs_integrity.py tests/test_package_isolation.py -q"
# Assumes site/ already exists (docs-contract or docs-build ran first).
docs-links = "pixi run python scripts/check_docs_links.py"

# Core benchmarks (essential)
# After a fresh clone, run:  pixi run bench-install
# This builds the C++ extension once; benchmarks reuse it.
bench-install = "pip install -e . --no-build-isolation"
bench-fits = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --fits-only"
bench-fitstable = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --fitstable-only"
# Same command as bench-fits; mnemonic for Apple Silicon hosts (device picked at runtime).
bench-mps = "pixi run bench-fits"
bench-table-arrow = "pixi run -e bench bench-install && pixi run -e bench python benchmarks/bench_arrow_tables.py"

# Comprehensive benchmarks (renamed from exhaustive)
bench-all = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --scope all"
bench-all-keep = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --scope all --keep-temp"

bench-all-force = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile lab --scope all"
bench-exhaustive = "bash scripts/run_exhaustive_bench_and_patch_docs.sh"
bench-suite = "bash scripts/bench_suite.sh"
bench-exhaustive-local = "bash scripts/bench_exhaustive_local.sh"
bench-exhaustive-canfar-cpu = "TORCHFITS_BENCH_MODE=exhaustive-cpu bash scripts/launch_canfar_gpu_bench.sh"
bench-exhaustive-canfar-cuda = "TORCHFITS_BENCH_MODE=exhaustive bash scripts/launch_canfar_gpu_bench.sh"
bench-release-scorecard = "bash scripts/bench_release_scorecard.sh"
bench-canfar-gpu = "bash scripts/launch_canfar_gpu_bench.sh"
bench-cache = "pixi run -e bench bench-install && pixi run -e bench python benchmarks/bench_cache.py"
bench-deficit-focus = "bash scripts/bench_deficit_focus.sh"
# Pure-C CFITSIO (vendored) microbench + torchfits/fitsio peers on same fixtures
bench-cfitsio-direct = "bash scripts/bench_cfitsio_direct.sh"
bench-megacam = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_megacam_cutouts.py"
bench-ml = "pixi run -e bench bench-install && pixi run -e bench python benchmarks/bench_ml_loader.py --output benchmarks_results/ml_$(date -u +%Y%m%d_%H%M%S)/ml_results.csv --run-id ml_$(date -u +%Y%m%d_%H%M%S)"

# Render the bench-all CSV into the I/O Transport x Backend markdown section
# of docs/benchmarks.md. Pass --csv after --, e.g.:
#   pixi run bench-table-render -- --csv benchmarks_results/<run-id>/results.csv
bench-table-render = "pixi run -e default python scripts/render_bench_iopath_table.py"

[feature.prod.dependencies]
python = "3.13.*"

# Test feature with comparison libraries
[feature.test.dependencies]
astropy = ">=5.0"
fitsio = ">=1.2"

# Benchmark feature with additional dependencies
[feature.bench.dependencies]
astropy = ">=5.0"
fitsio = ">=1.2"
matplotlib = ">=3.8"
pandas = ">=2.2"
psutil = ">=7.2.2,<8"
# Build deps needed so pip install -e . can compile the C++ extension
cmake = ">=3.21"
ninja = ">=1.10"
nanobind = ">=2.10.2"
scikit-build-core = ">=0.11.6"
pip = ">=24.0"
cxx-compiler = ">=1.11.0,<2"
# GPU feature pins its own gcc downgrade so nvcc 12.4 accepts the host
# compiler. cudart-dev 12.8 bundles a libcudart that exposes cudaGetDriver*
# symbols; the conda install path is satisfied by the CUDAToolkit_* cmake
# flags in pyproject.toml.
# GPU feature: real CUDA-enabled PyTorch for H100/Hopper (sm_90) benchmarking.
# We start from the conda-forge CPU pytorch that the workspace already pins,
# then swap it for the CUDA wheel via pip in 'gpu-bootstrap'. This avoids the
# pytorch-channel python-version mismatch and lets us target H100 sm_90 with
# the cu128 wheel while keeping the rest of the env on conda-forge.
#
# cuda-toolkit is added so the C++ extension's cmake can find_package(CUDA)
# when scikit-build-core probes libtorch. The cu128 pip wheel replaces the
# conda pytorch CPU build at runtime; cuda-toolkit satisfies the compile-time
# probe without dragging in a full nvidia channel.
[feature.gpu.dependencies]
# Cuda-toolkit lives on the nvidia channel, which has no osx-arm64 builds; gate
# it to linux-64 only. macOS users keep the CPU-only default and stay on bench-all.
# cuda-cudart-dev + cuda-nvcc provide headers + libs that PyTorch's cuda.cmake
# requires (FindCUDA bypass via CMAKE_DISABLE_FIND_PACKAGE_CUDA alone is not
# enough: PyTorch's own cmake re-checks CUDA_TOOLKIT_ROOT_DIR).
[feature.gpu.target.linux-64.dependencies]
# cu128 wheel bundles its own nvidia-cuda-runtime-cu12/libs.
# We don't need conda CUDA dev packages which only ship
# libcudart.so without headers; -DCAFFE2_USE_CUDA=OFF in
# pyproject.toml short-circuits Caffe2's CUDA probe.

[feature.gpu.tasks]
gpu-bootstrap = "bash scripts/gpu-bootstrap.sh"
bench-gpu-install = "bash -c 'unset CC CXX CFLAGS CXXFLAGS LDFLAGS && rm -rf build src/torchfits.egg-info && find src/torchfits -name \"_C*.so\" -delete && python -m pip install -e . --no-build-isolation --no-deps'"
bench-gpu = "pixi run -e bench-gpu gpu-bootstrap && pixi run -e bench-gpu bench-gpu-install && pixi run -e bench-gpu gpu-env-check && pixi run -e bench-gpu python benchmarks/bench_all.py --profile user --scope all --run-id gpu_$(date -u +%Y%m%d_%H%M%S)"
gpu-env-check = "python -c \"import torch; assert torch.cuda.is_available(), 'gpu-env-check: CUDA not reachable from this env'; print('torch=', torch.__version__, 'cuda_available=', torch.cuda.is_available()); print('cuda runtime=', torch.version.cuda); print('device=', torch.cuda.get_device_name(0), 'cap=', torch.cuda.get_device_capability(0))\""

# Propagation to all bench-gpu tasks at runtime. The C++ extension (torchfits._C) has no embedded
# RPATH pointing at torch's bundled libtorch_python + libtorch_cuda + libc10_cuda, nor at
# conda's libcudart.so.12. cu128 wheel's bundled nvidia-cuda-runtime-cu12 may also live under
# site-packages/nvidia/cuda_runtime/lib. The CPU edit-install build doesn't link these at
# compile time; they're dlopen-time only — without this LD_LIBRARY_PATH the loader fails on
# `import torchfits._C` with libcudart.so.12 / libc10_cuda.so errors.
[feature.gpu.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib/python3.13/site-packages/torch/lib:$CONDA_PREFIX/lib/python3.13/site-packages/nvidia/cuda_runtime/lib:$CONDA_PREFIX/lib/python3.13/site-packages/nvidia/nccl/lib:$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"

[environments]
default = { features = ["prod"] }
test = { features = ["prod", "test"] }
bench = { features = ["prod", "bench"] }
bench-all = { features = ["prod", "bench"] }
bench-gpu = { features = ["prod", "bench", "gpu"] }

[target.osx-arm64.dependencies]
cfitsio = ">=4.6.4,<4.6.5"

[target.linux-64.dependencies]
cfitsio = ">=4.6.3,<4.6.4"

[pypi-dependencies]
zensical = ">=0.0.50, <0.0.51"
