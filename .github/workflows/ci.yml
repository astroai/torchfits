name: Comprehensive CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  FORCE_COLOR: 1
  TORCHFITS_EXAMPLE_FAST: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint tools
        run: python -m pip install "ruff>=0.15,<0.16" "mypy>=1.0"
      - name: Duplicate C++ check
        run: python3 scripts/check_duplicate_cpp.py
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy type check
        run: mypy src/torchfits --ignore-missing-imports

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Vendor CFITSIO
        run: bash extern/vendor.sh --cfitsio-version extern/VERSIONS.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy astropy fitsio pytest nanobind scikit-build-core psutil pyarrow tomli
      - name: Build and install
        run: pip install -e . --no-build-isolation
      - name: Pytest
        # ponytail: separate processes cap 7-GB runner RSS; CANFAR keeps the
        # unsharded full-suite gate that can detect cross-file state leaks.
        run: |
          pytest tests/ -q --ignore-glob='tests/test_[n-z]*'
          pytest tests/ -q --ignore-glob='tests/test_[a-m]*'

  bench-smoke:
    name: Benchmark smoke (py3.13)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Vendor CFITSIO
        run: bash extern/vendor.sh --cfitsio-version extern/VERSIONS.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy astropy fitsio pytest nanobind scikit-build-core psutil pyarrow tomli
          pip install -e . --no-build-isolation
      - name: bench_cpp_backend
        run: python benchmarks/bench_cpp_backend.py

  docs-contract:
    name: Docs contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Vendor CFITSIO
        run: bash extern/vendor.sh --cfitsio-version extern/VERSIONS.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy astropy fitsio pytest nanobind scikit-build-core psutil pyarrow tomli
          pip install -e . --no-build-isolation
      - name: Docs integrity
        run: pytest tests/test_docs_integrity.py tests/test_package_isolation.py -q
      - name: Zensical build
        run: |
          pip install "zensical>=0.0.50,<0.0.51"
          zensical build --clean

  release-gate:
    name: Release gate (py3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Vendor CFITSIO
        run: bash extern/vendor.sh --cfitsio-version extern/VERSIONS.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy astropy fitsio pytest nanobind scikit-build-core psutil pyarrow tomli
          pip install -e . --no-build-isolation
      - name: Release gate tests
        env:
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: >-
          pytest tests/test_fitsio_upstream_smoke.py tests/test_astropy_upstream_smoke.py
          tests/test_package_isolation.py tests/test_docs_integrity.py tests/test_fits_schema.py
          tests/test_read_policy.py tests/test_examples_runner.py tests/test_scale_on_device.py
          tests/test_data.py tests/test_transforms.py tests/test_transforms_e2e.py
          tests/test_api.py tests/test_arrow_table_api.py tests/test_security.py
          tests/test_release_smoke.py -q
