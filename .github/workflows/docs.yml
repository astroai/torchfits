name: Documentation

on:
  push:
    branches:
      - main
  # Do not deploy from tags: github-pages env only allows `main`, and a tag
  # push would cancel the concurrent main deploy (see /edge/ 404 after rc2).
  # Stable docs are still built from the latest v* tag via build_docs_pages.sh
  # whenever main runs after a release.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs (stable + edge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install "zensical>=0.0.50,<0.0.51"
      - name: Build Pages tree (stable=/ edge=/edge/)
        run: bash scripts/build_docs_pages.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site_pages

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/deploy-pages@v4
        id: deployment
